name: Release

# Runs on every push to main (including merged PRs). Bumps the patch version,
# builds .dmg/.exe/.AppImage, publishes to npm, and creates a GitHub release.
# The npm package version and the GitHub release tag are always in sync —
# they're produced from the same version bump commit in the `prepare` job.

on:
  push:
    branches: [main]

permissions:
  contents: write   # push version bump commit, create tags and releases
  id-token: write   # for npm provenance

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # 1. Bump patch version, commit, tag, push. All other jobs check out the tag.
  prepare:
    if: "!contains(github.event.head_commit.message, '[skip release]')"
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
      sha: ${{ steps.bump.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Configure git identity
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
      - name: Bump patch version
        id: bump
        run: |
          NEW=$(npm version patch --no-git-tag-version)
          git add package.json package-lock.json
          git commit -m "chore(release): $NEW [skip release]"
          git tag -a "$NEW" -m "Release $NEW"
          echo "version=${NEW#v}" >> "$GITHUB_OUTPUT"
          echo "tag=$NEW" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - name: Push commit and tag
        run: |
          git push origin HEAD:main
          git push origin ${{ steps.bump.outputs.tag }}

  # 2. Build platform binaries in parallel. Each runner checks out the new tag
  #    so all artifacts carry the same version.
  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            build_flag: "--mac"
            artifact_name: macos
          - os: windows-latest
            build_flag: "--win"
            artifact_name: windows
          - os: ubuntu-latest
            build_flag: "--linux"
            artifact_name: linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
      - name: Package
        run: npx electron-builder ${{ matrix.build_flag }} --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            release/*.dmg
            release/*.exe
            release/*.AppImage
            release/*.deb
            release/*.zip
          if-no-files-found: ignore

  # 3. Publish the same version to npm.
  publish-npm:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # 4. Attach all built binaries to a GitHub Release for the same tag.
  release:
    needs: [prepare, build, publish-npm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.tag }}
          generate_release_notes: true
          files: |
            artifacts/*.dmg
            artifacts/*.exe
            artifacts/*.AppImage
            artifacts/*.deb
            artifacts/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
